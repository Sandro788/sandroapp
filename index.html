<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>La mia pagina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #24292e;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background: white;
      border-radius: 10px;
    }
    h1 {
      margin-top: 0;
    }
    button {
      background: #0366d6;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #024c9a;
    }
  </style>
</head>
<body>

<header>
  <h1>Benvenuto nella mia pagina</h1>
</header>

<main>
  <h2>Chi sono</h2>
  <p>Ciao! Questa è la mia prima pagina web.</p>

  <h2>Interazione</h2>
  <button onclick="saluta()">Cliccami</button>
</main>

<script>
  function saluta() {
    alert("Ciao! Funziona 🎉");
  }
</script>

</body>
</html>
