<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SandroApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
    }

    /* Sezione con sfondo ufficio */
    .hero {
      background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
      padding: 100px 20px;
    }

    /* Smartphone */
    .phone {
      width: 250px;
      height: 500px;
      background: #111;
      border-radius: 30px;
      margin: auto;
      padding: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .screen {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100%;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    /* Sezione app */
    .apps {
      max-width: 900px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .app-card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .app-card img {
      width: 100%;
      border-radius: 10px;
    }

    .app-card h3 {
      margin: 10px 0 5px;
    }

    .app-card p {
      font-size: 14px;
      color: #555;
    }

  </style>
</head>
<body>

  <!-- HERO con sfondo ufficio -->
  <div class="hero">
    <div class="phone">
      <div class="screen">
        SandroApp
      </div>
    </div>
  </div>

  <!-- App -->
  <div class="apps">

    <div class="app-card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Liste della Spesa</h3>
      <p>Crea le tue liste velocemente.</p>
    </div>

    <div class="app-card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Nome App 2</h3>
      <p>Descrizione della tua app.</p>
    </div>

    <div class="app-card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Nome App 3</h3>
      <p>Descrizione della tua app.</p>
    </div>

  </div>

</body>
</html>
